name: Build custom Docker image

on:
  push:
    branches:
      - custom-lmh
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: custom-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/lur1n77777/sub2api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout custom branch
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:custom
            ${{ env.IMAGE_NAME }}:custom-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=sub2api-custom
            org.opencontainers.image.description=Custom Sub2API build from custom-lmh branch